<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omni Ocean Labs | Stealth Mode</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #001a33; /* Manchester Blue */
            background: radial-gradient(circle at center, #002b5c 0%, #001a33 100%);
            color: #ffffff;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .content-box {
            padding: 40px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px);
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 200;
            letter-spacing: 6px;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        .divider {
            width: 80px;
            height: 1px;
            background-color: #007bff;
            margin: 30px auto;
        }

        p {
            font-size: 1.1rem;
            color: #d1d1d1;
            letter-spacing: 3px;
            font-weight: 300;
            text-transform: uppercase;
        }

        .footer-tag {
            margin-top: 60px;
            font-size: 0.7rem;
            letter-spacing: 4px;
            color: #4f6d8d;
            opacity: 0.6;
        }
    </style>
</head>
<body>

    <div class="content-box">
        <p>Omni Ocean Labs</p>
        <div class="divider"></div>
        <h1>Multiple Pillars of Protection</h1>
        <div class="footer-tag">STEALTH MODE ACTIVATED</div>
    </div>

</body>
</html>
